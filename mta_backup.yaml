_schema-version: 3.3.0
ID: VendorInvoiceManagement
description: A simple CAP project.
version: 1.0.0

modules:
  - name: VendorInvoiceManagement-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: VendorInvoiceManagement-auth
      - name: VendorInvoiceManagement-db
      - name: VendorInvoiceManagement-destination-service
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci

  - name: VendorInvoiceManagement-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: VendorInvoiceManagement-db
    parameters:
      buildpack: nodejs_buildpack

  - name: vendorinvoiceinvoiceui
    type: html5
    path: app/invoice-ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: VendorInvoiceManagement-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: VendorInvoiceManagement-repo-host
        parameters:
          content-target: true
      - name: VendorInvoiceManagement-destination-service
      - name: srv-api
    build-parameters:
      build-result: resources
      requires:
        - name: vendorinvoiceinvoiceui
          artifacts:
            - vendorinvoiceinvoiceui.zip
          target-path: resources/

  - name: VendorInvoiceManagement-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: VendorInvoiceManagementinvoiceui
          artifacts:
            - invoice-ui.zip
          target-path: app/
        - name: vendorinvoiceinvoiceui
    requires:
      - name: VendorInvoiceManagement-auth
      - name: srv-api
      - name: VendorInvoiceManagement-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
      - name: VendorInvoiceManagement-repo-host
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: VendorInvoiceManagement-destinations
    type: com.sap.application.content
    requires:
      - name: VendorInvoiceManagement-auth
        parameters:
          service-key:
            name: VendorInvoiceManagement-auth-key
      - name: VendorInvoiceManagement-html5-repo-host
        parameters:
          service-key:
            name: VendorInvoiceManagement-html5-repo-host-key
      - name: srv-api
      - name: VendorInvoiceManagement-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: VendorInvoiceManagement-html5-repository
              ServiceInstanceName: VendorInvoiceManagement-html5-repo-host
              ServiceKeyName: VendorInvoiceManagement-html5-repo-host-key
              sap.cloud.service: VendorInvoiceManagement.service
            - Name: VendorInvoiceManagement-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: VendorInvoiceManagement-auth
              ServiceKeyName: VendorInvoiceManagement-auth-key
              sap.cloud.service: VendorInvoiceManagement.service

resources:

  - name: VendorInvoiceManagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: VendorInvoiceManagement-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        role-collections:
          - name: "Admin (VendorInvoiceManagement ${org}-${space})"
            description: generated
            role-template-references:
              - $XSAPPNAME.Admin
          - name: "Approver (VendorInvoiceManagement ${org}-${space})"
            description: generated
            role-template-references:
              - $XSAPPNAME.Approver
          - name: "Viewer (VendorInvoiceManagement ${org}-${space})"
            description: generated
            role-template-references:
              - $XSAPPNAME.Viewer
          - name: "VendorManager (VendorInvoiceManagement ${org}-${space})"
            description: generated
            role-template-references:
              - $XSAPPNAME.VendorManager

  - name: VendorInvoiceManagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: VendorInvoiceManagement-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-name: VendorInvoiceManagement-html5-service

  - name: VendorInvoiceManagement-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      service-name: VendorInvoiceManagement-destination-service
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                URL: https://ui5.sap.com

              - Name: srv-api
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                URL: ~{srv-api/srv-url}
    requires:
      - name: srv-api

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
