_schema-version: "3.3.0"
ID: VendorInvoiceManagement
version: 1.0.0
description: Vendor Invoice Management

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:

  - name: VendorInvoiceManagement-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: VendorInvoiceManagement-db
      - name: VendorInvoiceManagement-auth
      - name: VendorInvoiceManagement-destination

  - name: VendorInvoiceManagement-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: VendorInvoiceManagement-db

  - name: vendorinvoiceinvoiceui
    type: html5
    path: app/invoice-ui
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms: []

  - name: VendorInvoiceManagement-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: VendorInvoiceManagement-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: vendorinvoiceinvoiceui
          artifacts:
            - vendorinvoiceinvoiceui.zip
          target-path: resources/

resources:

  - name: VendorInvoiceManagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: VendorInvoiceManagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json


  - name: VendorInvoiceManagement-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication

  - name: VendorInvoiceManagement-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: VendorInvoiceManagement-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime